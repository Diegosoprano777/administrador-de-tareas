<section class="tareas">

  <div class="panel">

    <header class="panel-header">
      <h2>Tareas de {{ nombre }}</h2>

      <button class="btn-agregar">
        Agregar Tarea Nueva
      </button>
    </header>

    <ul class="lista-tareas">

      @for (tarea of tareasUsuarioSeleccionado; track tarea.id) {

        <li class="tarea-card">

          <div class="tarea-info">

            <h3 class="titulo">
              {{ tarea.titulo }}
            </h3>

            <p class="tiempo">
              <strong>Tiempo:</strong> {{ tarea.tiempo }}
            </p>

            <p class="resumen">
              {{ tarea.resumen }}
            </p>

          </div>

          <button class="estado">
            Terminada
          </button>

        </li>

      }

    </ul>

  </div>

</section>
