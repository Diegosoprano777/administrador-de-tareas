<app-encabezado></app-encabezado>

<main class="contenedor">

  <ul class="usuarios">
    @for (usuario of usuarios; track usuario.id) {
      <li>
        <app-usuario
          [usuario]="usuario"
          (seleccion)="seleccionarUsuario($event)">
        </app-usuario>
      </li>
    }
  </ul>

  <div class="panel-tareas">
    <app-tareas
      [usuario]="usuarioSeleccionado">
    </app-tareas>
  </div>

</main>
